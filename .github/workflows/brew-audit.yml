name: brew audit

on:
  pull_request:
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
      - name: Run brew audit on formulas
        run: |
          for formula in Formula/*.rb; do
            name="$(basename "$formula" .rb)"
            echo "Auditing $name (from $formula)..."
            brew audit --strict "$name" || exit 1
          done
      - name: Run brew formulae syntax check
        run: |
          for formula in Formula/*.rb; do
            echo "Checking syntax of $formula..."
            ruby -c "$formula" || exit 1
          done
